openapi: 3.0.3
info:
  title: Home Hub API
  version: 1.0.0
  description: Home Hub 全機能の API 定義。
tags:
  - name: expense
    description: 支出管理
  - name: expense-categories
    description: 支出カテゴリ管理
  - name: price-records
    description: 食品価格記録管理
  - name: price-record-supermarkets
    description: スーパーマスタ管理
  - name: price-record-categories
    description: 食品カテゴリマスタ管理
  - name: recipes
    description: レシピ管理
  - name: recipes-ai
    description: AI 献立サポート
paths:
  /expenses:
    get:
      tags:
        - expense
      summary: 支出一覧取得
      description: 指定した月の支出一覧と月間合計金額を返す。month を省略した場合は当月。
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: ^\d{4}-\d{2}$
            example: 2026-03
          description: 対象月（YYYY-MM 形式）。省略時は当月
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 支出一覧
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                  - page
                  - limit
                  - monthTotal
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenseWithCategory'
                  total:
                    type: integer
                    description: 当月の合計件数
                  page:
                    type: integer
                  limit:
                    type: integer
                  monthTotal:
                    type: integer
                    description: 当月の支出合計金額（円）
    post:
      tags:
        - expense
      summary: 支出登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategory'
        '400':
          $ref: '#/components/responses/ValidationError'
  /expenses/{id}:
    put:
      tags:
        - expense
      summary: 支出更新
      description: 支出情報を更新する。「確認済み」ボタン押下時は approved=true を送信する。
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategory'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - expense
      summary: 支出削除
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /expenses/{id}/finalize:
    post:
      tags:
        - expense
      summary: 支出確定
      description: 確認済みの支出を確定済みに更新する。確定後は編集・削除・承認状態変更が不可となる。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: 確定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategory'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /expenses/categories:
    get:
      tags:
        - expense-categories
      summary: カテゴリ一覧取得
      responses:
        '200':
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                  - page
                  - limit
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
    post:
      tags:
        - expense-categories
      summary: カテゴリ登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'
  /expenses/categories/{id}:
    put:
      tags:
        - expense-categories
      summary: カテゴリ更新
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - expense-categories
      summary: カテゴリ削除
      description: カテゴリに紐付く支出が 1 件以上ある場合は 409 を返す。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /price-records:
    get:
      tags:
        - price-records
      summary: 価格記録一覧取得
      description: 品目名で部分一致検索・ページネーション付きで価格記録一覧を返す。登録日時の新しい順。
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: 品目名での部分一致フィルタ。省略時は全件
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 価格記録一覧
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                  - page
                  - limit
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PriceRecordWithRelations'
                  total:
                    type: integer
                    description: フィルタ条件に合う全件数
                  page:
                    type: integer
                  limit:
                    type: integer
    post:
      tags:
        - price-records
      summary: 価格記録登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceRecordCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceRecordWithRelations'
        '400':
          $ref: '#/components/responses/ValidationError'
  /price-records/{id}:
    put:
      tags:
        - price-records
      summary: 価格記録更新
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceRecordUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceRecordWithRelations'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - price-records
      summary: 価格記録削除
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
  /price-records/supermarkets:
    get:
      tags:
        - price-record-supermarkets
      summary: スーパー一覧取得
      responses:
        '200':
          description: スーパー一覧
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                  - page
                  - limit
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Supermarket'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
    post:
      tags:
        - price-record-supermarkets
      summary: スーパー登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupermarketCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supermarket'
        '400':
          $ref: '#/components/responses/ValidationError'
  /price-records/supermarkets/{id}:
    put:
      tags:
        - price-record-supermarkets
      summary: スーパー更新
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupermarketUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Supermarket'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - price-record-supermarkets
      summary: スーパー削除
      description: スーパーに紐付く価格記録が 1 件以上ある場合は 409 を返す。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /price-records/categories:
    get:
      tags:
        - price-record-categories
      summary: カテゴリ一覧取得
      responses:
        '200':
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                  - page
                  - limit
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PriceRecordCategory'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
    post:
      tags:
        - price-record-categories
      summary: カテゴリ登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceRecordCategoryCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceRecordCategory'
        '400':
          $ref: '#/components/responses/ValidationError'
  /price-records/categories/{id}:
    put:
      tags:
        - price-record-categories
      summary: カテゴリ更新
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceRecordCategoryUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceRecordCategory'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - price-record-categories
      summary: カテゴリ削除
      description: カテゴリに紐付く価格記録が 1 件以上ある場合は 409 を返す。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /recipes:
    get:
      tags:
        - recipes
      summary: レシピ一覧取得
      operationId: listRecipes
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - createdAt_desc
              - lastCookedAt_asc
              - cookedCount_desc
              - rating_desc
            default: createdAt_desc
          description: |
            ソート順:
            - createdAt_desc: 登録順（新しい順・デフォルト）
            - lastCookedAt_asc: しばらく作ってない順（NULL 先頭）
            - cookedCount_desc: よく作る順
            - rating_desc: 評価が高い順（excellent→good→average→poor→未設定）
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DishList'
    post:
      tags:
        - recipes
      summary: レシピ登録
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DishCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          $ref: '#/components/responses/ValidationError'
  /recipes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      tags:
        - recipes
      summary: レシピ更新
      operationId: updateRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DishUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - recipes
      summary: レシピ削除
      operationId: deleteRecipe
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'
  /recipes/extract:
    post:
      tags:
        - recipes-ai
      summary: AI レシピ抽出
      operationId: extractRecipe
      description: |
        レシピサイトからコピーした生テキスト（広告・ナビゲーション等のノイズを含んでよい）を
        Workers AI（llama-3.1）に渡し、構造化されたレシピデータを抽出して返す。
        抽出できなかったフィールドは null。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /recipes/ask:
    post:
      tags:
        - recipes-ai
      summary: AI 献立相談
      operationId: askRecipes
      description: |
        ユーザーの全レシピ（name・ingredients・lastCookedAt・rating・difficulty・cookedCount）を
        コンテキストとして Workers AI（llama-3.1）に渡し、自然言語の質問に回答する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
components:
  schemas:
    Expense:
      type: object
      required:
        - id
        - userId
        - amount
        - categoryId
        - approvedAt
        - finalizedAt
        - createdAt
      properties:
        id:
          type: string
          description: 支出 ID
        userId:
          type: string
          description: 登録ユーザー ID
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）
        categoryId:
          type: string
          description: カテゴリ ID
        approvedAt:
          type: string
          format: date-time
          nullable: true
          description: 承認日時。null の場合は未承認
        finalizedAt:
          type: string
          format: date-time
          nullable: true
          description: 確定日時。null の場合は未確定（編集・削除可能）
        createdAt:
          type: string
          format: date-time
          description: 登録日時（自動セット）
    ExpenseWithCategory:
      allOf:
        - $ref: '#/components/schemas/Expense'
        - type: object
          required:
            - category
          properties:
            category:
              $ref: '#/components/schemas/Category'
    ExpenseCreate:
      type: object
      required:
        - amount
        - categoryId
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）。1以上9,999,999以下の整数
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID
    ExpenseUpdate:
      type: object
      required:
        - amount
        - categoryId
        - approved
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID
        approved:
          type: boolean
          description: 承認フラグ。true にすると approvedAt に現在日時がセットされる
    Category:
      type: object
      required:
        - id
        - userId
        - name
        - createdAt
      properties:
        id:
          type: string
          description: カテゴリ ID
        userId:
          type: string
          description: 登録ユーザー ID
        name:
          type: string
          description: カテゴリ名
        createdAt:
          type: string
          format: date-time
          description: 登録日時
    CategoryCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内
    CategoryUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内
    PriceRecord:
      type: object
      required:
        - id
        - userId
        - supermarketId
        - categoryId
        - itemName
        - price
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: 価格記録 ID
        userId:
          type: string
          description: 登録ユーザー ID
        supermarketId:
          type: string
          description: スーパー ID
        categoryId:
          type: string
          description: カテゴリ ID
        itemName:
          type: string
          maxLength: 100
          description: 品目名（最大100文字）
        price:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 金額（円）。1以上9,999,999以下の整数
        notes:
          type: string
          maxLength: 500
          nullable: true
          description: 備考（最大500文字）。省略可
        createdAt:
          type: string
          format: date-time
          description: 登録日時（自動セット）
        updatedAt:
          type: string
          format: date-time
          description: 更新日時（自動セット）
    PriceRecordWithRelations:
      allOf:
        - $ref: '#/components/schemas/PriceRecord'
        - type: object
          required:
            - supermarket
            - category
          properties:
            supermarket:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: string
                name:
                  type: string
                  description: スーパー名
            category:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: string
                name:
                  type: string
                  description: カテゴリ名
    PriceRecordCreate:
      type: object
      required:
        - supermarketId
        - categoryId
        - itemName
        - price
      properties:
        supermarketId:
          type: string
          minLength: 1
          description: スーパー ID
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID
        itemName:
          type: string
          minLength: 1
          maxLength: 100
          description: 品目名。1文字以上100文字以内
        price:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 金額（円）。1以上9,999,999以下の整数
        notes:
          type: string
          maxLength: 500
          description: 備考。省略可。500文字以内
    PriceRecordUpdate:
      type: object
      required:
        - supermarketId
        - categoryId
        - itemName
        - price
      properties:
        supermarketId:
          type: string
          minLength: 1
          description: スーパー ID
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID
        itemName:
          type: string
          minLength: 1
          maxLength: 100
          description: 品目名。1文字以上100文字以内
        price:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 金額（円）。1以上9,999,999以下の整数
        notes:
          type: string
          maxLength: 500
          description: 備考。省略可。500文字以内
    Supermarket:
      type: object
      required:
        - id
        - userId
        - name
        - createdAt
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
          description: スーパー名
        createdAt:
          type: string
          format: date-time
    SupermarketCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: スーパー名。1文字以上50文字以内
    SupermarketUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: スーパー名。1文字以上50文字以内
    PriceRecordCategory:
      type: object
      required:
        - id
        - userId
        - name
        - createdAt
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
          description: カテゴリ名
        createdAt:
          type: string
          format: date-time
    PriceRecordCategoryCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内
    PriceRecordCategoryUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内
    Ingredient:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: 材料名
          example: 鶏もも肉
        amount:
          type: string
          description: '量・単位（例: 300g、1個）'
          example: 300g
    Rating:
      type: string
      enum:
        - excellent
        - good
        - average
        - poor
      description: |
        評価:
        - excellent: 非常に美味しい
        - good: 美味しい
        - average: 普通
        - poor: 微妙
    Difficulty:
      type: string
      enum:
        - easy
        - medium
        - hard
      description: |
        難易度:
        - easy: 簡単
        - medium: 普通
        - hard: 難しい
    Dish:
      type: object
      required:
        - id
        - userId
        - name
        - cookedCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: UUID
        userId:
          type: string
          description: オーナーユーザー ID
        name:
          type: string
          maxLength: 100
          description: レシピ名
        description:
          type: string
          maxLength: 500
          nullable: true
          description: 概要
        imageUrl:
          type: string
          nullable: true
          description: 画像 URL（外部 URL）
        ingredients:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Ingredient'
          description: 材料リスト
        steps:
          type: array
          nullable: true
          items:
            type: string
          description: 手順リスト
        sourceUrl:
          type: string
          nullable: true
          description: 参照元レシピ URL
        servings:
          type: integer
          minimum: 1
          nullable: true
          description: 何人前
        cookingTimeMinutes:
          type: integer
          minimum: 1
          nullable: true
          description: 調理時間（分）
        cookedCount:
          type: integer
          minimum: 0
          default: 0
          description: 作った回数
        lastCookedAt:
          type: string
          format: date-time
          nullable: true
          description: 最終調理日時
        rating:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Rating'
          description: 評価
        difficulty:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Difficulty'
          description: 難易度
        memo:
          type: string
          maxLength: 1000
          nullable: true
          description: 調理後の個人メモ
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DishCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: レシピ名（必須）
        description:
          type: string
          maxLength: 500
        imageUrl:
          type: string
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'
        steps:
          type: array
          items:
            type: string
        sourceUrl:
          type: string
        servings:
          type: integer
          minimum: 1
        cookingTimeMinutes:
          type: integer
          minimum: 1
        rating:
          $ref: '#/components/schemas/Rating'
        difficulty:
          $ref: '#/components/schemas/Difficulty'
        memo:
          type: string
          maxLength: 1000
    DishUpdate:
      type: object
      required:
        - name
        - cookedCount
      description: 全フィールド送信（PUT）。省略可能フィールドは null で明示的にクリアできる。
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        imageUrl:
          type: string
          nullable: true
        ingredients:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Ingredient'
        steps:
          type: array
          nullable: true
          items:
            type: string
        sourceUrl:
          type: string
          nullable: true
        servings:
          type: integer
          minimum: 1
          nullable: true
        cookingTimeMinutes:
          type: integer
          minimum: 1
          nullable: true
        cookedCount:
          type: integer
          minimum: 0
        lastCookedAt:
          type: string
          format: date-time
          nullable: true
        rating:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Rating'
        difficulty:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Difficulty'
        memo:
          type: string
          maxLength: 1000
          nullable: true
    DishList:
      type: object
      required:
        - items
        - total
        - page
        - limit
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Dish'
        total:
          type: integer
          description: 条件に合う全件数
        page:
          type: integer
          description: 現在のページ（1 始まり）
        limit:
          type: integer
          description: 1 ページあたりの件数
    ExtractRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          description: レシピサイトからコピーした生テキスト（ノイズ込みで可）
    ExtractResponse:
      type: object
      description: AI が抽出したレシピデータ。抽出できなかったフィールドは null。
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        servings:
          type: integer
          nullable: true
        cookingTimeMinutes:
          type: integer
          nullable: true
        ingredients:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Ingredient'
        steps:
          type: array
          nullable: true
          items:
            type: string
    AskRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 500
          description: 献立に関する自然言語の質問
          example: 最近作ってないもので肉系が食べたいんだけどいいのある？
    AskResponse:
      type: object
      required:
        - answer
      properties:
        answer:
          type: string
          description: Workers AI による回答
    AppError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - NOT_FOUND
            - INTERNAL_SERVER_ERROR
        message:
          type: string
        fields:
          type: array
          description: バリデーションエラー時のフィールドエラー一覧
          items:
            type: object
            required:
              - field
              - message
            properties:
              field:
                type: string
              message:
                type: string
  responses:
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            type: object
            required:
              - code
              - message
            properties:
              code:
                type: string
                example: VALIDATION_ERROR
              message:
                type: string
                example: 入力値が正しくありません
              fields:
                type: array
                items:
                  type: object
                  required:
                    - field
                    - message
                  properties:
                    field:
                      type: string
                      example: field_name
                    message:
                      type: string
                      example: フィールドは必須です
    Conflict:
      description: 競合エラー（使用中のリソースは削除不可）
      content:
        application/json:
          schema:
            type: object
            required:
              - code
              - message
            properties:
              code:
                type: string
                example: CONFLICT
              message:
                type: string
                example: このリソースは使用中のため削除できません
    NotFound:
      description: リソースが見つからない
      content:
        application/json:
          schema:
            type: object
            required:
              - code
              - message
            properties:
              code:
                type: string
                example: NOT_FOUND
              message:
                type: string
                example: 該当データが見つかりません
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: リソース ID
