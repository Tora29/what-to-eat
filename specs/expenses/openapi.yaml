openapi: 3.0.3
info:
  title: Expense API
  description: 収支管理 API
  version: 2.0.0

tags:
  - name: expense
    description: 支出管理
  - name: expense-categories
    description: 支出カテゴリ管理
  - name: expense-payers
    description: 支出支払者管理

paths:
  /expenses:
    get:
      tags: [expense]
      summary: 支出一覧取得
      description: 指定した月の支出一覧と月間合計金額を返す。month を省略した場合は当月。
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
            example: '2026-03'
          description: 対象月（YYYY-MM 形式）。省略時は当月
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 支出一覧
          content:
            application/json:
              schema:
                type: object
                required: [items, total, page, limit, monthTotal]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenseWithCategoryAndPayer'
                  total:
                    type: integer
                    description: 当月の合計件数
                  page:
                    type: integer
                  limit:
                    type: integer
                  monthTotal:
                    type: integer
                    description: 当月の支出合計金額（円）

    post:
      tags: [expense]
      summary: 支出登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategoryAndPayer'
        '400':
          $ref: '#/components/responses/ValidationError'

  /expenses/{id}:
    put:
      tags: [expense]
      summary: 支出更新
      description: 支出のデータ（金額・カテゴリ・支払者）を更新する。承認状態の変更は /approve・/unapprove エンドポイントを使う。
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategoryAndPayer'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      tags: [expense]
      summary: 支出削除
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /expenses/{id}/approve:
    post:
      tags: [expense]
      summary: 支出承認
      description: 未承認の支出を確認済みに更新する（approvedAt に現在日時をセット）。確定済みの支出には操作不可。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: 承認成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategoryAndPayer'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /expenses/{id}/unapprove:
    post:
      tags: [expense]
      summary: 支出承認取消
      description: 確認済み（未確定）の支出を未承認に戻す（approvedAt を null にリセット）。確定済みの支出には操作不可。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: 承認取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategoryAndPayer'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /expenses/{id}/finalize:
    post:
      tags: [expense]
      summary: 支出確定
      description: 確認済みの支出を確定済みに更新する。確定後は編集・削除・承認状態変更が不可となる。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: 確定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategoryAndPayer'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /expenses/categories:
    get:
      tags: [expense-categories]
      summary: カテゴリ一覧取得
      responses:
        '200':
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                type: object
                required: [items, total, page, limit]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer

    post:
      tags: [expense-categories]
      summary: カテゴリ登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'

  /expenses/categories/{id}:
    put:
      tags: [expense-categories]
      summary: カテゴリ更新
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [expense-categories]
      summary: カテゴリ削除
      description: カテゴリに紐付く支出が 1 件以上ある場合は 409 を返す。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /expenses/payers:
    get:
      tags: [expense-payers]
      summary: 支払者一覧取得
      responses:
        '200':
          description: 支払者一覧
          content:
            application/json:
              schema:
                type: object
                required: [items, total, page, limit]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payer'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer

    post:
      tags: [expense-payers]
      summary: 支払者登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayerCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payer'
        '400':
          $ref: '#/components/responses/ValidationError'

  /expenses/payers/{id}:
    put:
      tags: [expense-payers]
      summary: 支払者更新
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayerUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payer'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [expense-payers]
      summary: 支払者削除
      description: 支払者に紐付く支出が 1 件以上ある場合は 409 を返す。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: リソース ID

  schemas:
    Expense:
      type: object
      required: [id, userId, amount, categoryId, payerId, approvedAt, finalizedAt, createdAt]
      properties:
        id:
          type: string
          description: 支出 ID
        userId:
          type: string
          description: 登録ユーザー ID
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）
        categoryId:
          type: string
          description: カテゴリ ID
        payerId:
          type: string
          description: 支払者 ID
        approvedAt:
          type: string
          format: date-time
          nullable: true
          description: 承認日時。null の場合は未承認
        finalizedAt:
          type: string
          format: date-time
          nullable: true
          description: 確定日時。null の場合は未確定（編集・削除可能）
        createdAt:
          type: string
          format: date-time
          description: 登録日時（自動セット）

    ExpenseWithCategoryAndPayer:
      allOf:
        - $ref: '#/components/schemas/Expense'
        - type: object
          required: [category, payer]
          properties:
            category:
              $ref: '#/components/schemas/Category'
            payer:
              $ref: '#/components/schemas/Payer'

    ExpenseCreate:
      type: object
      required: [amount, categoryId, payerId]
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）。1以上9,999,999以下の整数
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID
        payerId:
          type: string
          minLength: 1
          description: 支払者 ID

    ExpenseUpdate:
      type: object
      required: [amount, categoryId, payerId]
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID
        payerId:
          type: string
          minLength: 1
          description: 支払者 ID

    Category:
      type: object
      required: [id, userId, name, createdAt]
      properties:
        id:
          type: string
          description: カテゴリ ID
        userId:
          type: string
          description: 登録ユーザー ID
        name:
          type: string
          description: カテゴリ名
        createdAt:
          type: string
          format: date-time
          description: 登録日時

    CategoryCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内

    CategoryUpdate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内

    Payer:
      type: object
      required: [id, userId, name, createdAt]
      properties:
        id:
          type: string
          description: 支払者 ID
        userId:
          type: string
          description: 登録ユーザー ID
        name:
          type: string
          description: 支払者名
        createdAt:
          type: string
          format: date-time
          description: 登録日時

    PayerCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: 支払者名。1文字以上50文字以内

    PayerUpdate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: 支払者名。1文字以上50文字以内

  responses:
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            type: object
            required: [code, message]
            properties:
              code:
                type: string
                example: VALIDATION_ERROR
              message:
                type: string
                example: 入力値が正しくありません
              fields:
                type: array
                items:
                  type: object
                  required: [field, message]
                  properties:
                    field:
                      type: string
                      example: field_name
                    message:
                      type: string
                      example: フィールドは必須です

    NotFound:
      description: リソースが見つからない
      content:
        application/json:
          schema:
            type: object
            required: [code, message]
            properties:
              code:
                type: string
                example: NOT_FOUND
              message:
                type: string
                example: 該当データが見つかりません

    Conflict:
      description: 競合エラー（使用中のリソースは削除不可）
      content:
        application/json:
          schema:
            type: object
            required: [code, message]
            properties:
              code:
                type: string
                example: CONFLICT
              message:
                type: string
                example: このリソースは使用中のため削除できません
