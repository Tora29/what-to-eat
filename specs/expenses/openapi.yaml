openapi: 3.0.3
info:
  title: Expense API
  description: 収支管理 API
  version: 1.0.0

tags:
  - name: expense
    description: 支出管理
  - name: expense-categories
    description: 支出カテゴリ管理

paths:
  /expenses:
    get:
      tags: [expense]
      summary: 支出一覧取得
      description: 指定した月の支出一覧と月間合計金額を返す。month を省略した場合は当月。
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
            example: '2026-03'
          description: 対象月（YYYY-MM 形式）。省略時は当月
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 支出一覧
          content:
            application/json:
              schema:
                type: object
                required: [items, total, page, limit, monthTotal]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenseWithCategory'
                  total:
                    type: integer
                    description: 当月の合計件数
                  page:
                    type: integer
                  limit:
                    type: integer
                  monthTotal:
                    type: integer
                    description: 当月の支出合計金額（円）

    post:
      tags: [expense]
      summary: 支出登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategory'
        '400':
          $ref: '#/components/responses/ValidationError'

  /expenses/{id}:
    put:
      tags: [expense]
      summary: 支出更新
      description: 支出情報を更新する。「確認済み」ボタン押下時は approved=true を送信する。
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseWithCategory'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [expense]
      summary: 支出削除
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /expenses/categories:
    get:
      tags: [expense-categories]
      summary: カテゴリ一覧取得
      responses:
        '200':
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                type: object
                required: [items, total, page, limit]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer

    post:
      tags: [expense-categories]
      summary: カテゴリ登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'

  /expenses/categories/{id}:
    put:
      tags: [expense-categories]
      summary: カテゴリ更新
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [expense-categories]
      summary: カテゴリ削除
      description: カテゴリに紐付く支出が 1 件以上ある場合は 409 を返す。
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: リソース ID

  schemas:
    Expense:
      type: object
      required: [id, userId, amount, categoryId, approvedAt, createdAt]
      properties:
        id:
          type: string
          description: 支出 ID
        userId:
          type: string
          description: 登録ユーザー ID
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）
        categoryId:
          type: string
          description: カテゴリ ID
        approvedAt:
          type: string
          format: date-time
          nullable: true
          description: 承認日時。null の場合は未承認
        createdAt:
          type: string
          format: date-time
          description: 登録日時（自動セット）

    ExpenseWithCategory:
      allOf:
        - $ref: '#/components/schemas/Expense'
        - type: object
          required: [category]
          properties:
            category:
              $ref: '#/components/schemas/Category'

    ExpenseCreate:
      type: object
      required: [amount, categoryId]
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）。1以上9,999,999以下の整数
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID

    ExpenseUpdate:
      type: object
      required: [amount, categoryId, approved]
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 9999999
          description: 支出金額（円）
        categoryId:
          type: string
          minLength: 1
          description: カテゴリ ID
        approved:
          type: boolean
          description: 承認フラグ。true にすると approvedAt に現在日時がセットされる

    Category:
      type: object
      required: [id, userId, name, createdAt]
      properties:
        id:
          type: string
          description: カテゴリ ID
        userId:
          type: string
          description: 登録ユーザー ID
        name:
          type: string
          description: カテゴリ名
        createdAt:
          type: string
          format: date-time
          description: 登録日時

    CategoryCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内

    CategoryUpdate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: カテゴリ名。1文字以上50文字以内

  responses:
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            type: object
            required: [code, message]
            properties:
              code:
                type: string
                example: VALIDATION_ERROR
              message:
                type: string
                example: 入力値が正しくありません
              fields:
                type: array
                items:
                  type: object
                  required: [field, message]
                  properties:
                    field:
                      type: string
                      example: amount
                    message:
                      type: string
                      example: 金額は必須です

    Conflict:
      description: 競合エラー（使用中のリソースは削除不可）
      content:
        application/json:
          schema:
            type: object
            required: [code, message]
            properties:
              code:
                type: string
                example: CONFLICT
              message:
                type: string
                example: このカテゴリは使用中のため削除できません

    NotFound:
      description: リソースが見つからない
      content:
        application/json:
          schema:
            type: object
            required: [code, message]
            properties:
              code:
                type: string
                example: NOT_FOUND
              message:
                type: string
                example: 該当データが見つかりません
