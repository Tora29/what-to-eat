name = "home-hub"
pages_build_output_dir = ".svelte-kit/cloudflare"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "home-hub"
database_id = "d8430f83-51ef-47f6-9e9a-40dca3cd12e2"
migrations_dir = "drizzle/migrations"

[[r2_buckets]]
binding = "RECIPE_IMAGES"
bucket_name = "home-hub-recipe-images"

[ai]
binding = "AI"
