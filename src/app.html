<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Home Hub" />
		<meta name="theme-color" content="#C17454" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<script>
			(function () {
				try {
					var theme = localStorage.getItem('theme');
					if (theme === 'dark') {
						document.documentElement.classList.add('dark');
					} else if (theme === null && sessionStorage.getItem('theme') === 'dark') {
						// localStorage 未設定時は sessionStorage のダーク状態を引き継ぐ（AC-201）
						document.documentElement.classList.add('dark');
					}
					// ダーククラスの変化を sessionStorage に同期する
					new MutationObserver(function () {
						sessionStorage.setItem(
							'theme',
							document.documentElement.classList.contains('dark') ? 'dark' : 'light'
						);
					}).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
					var sidebar = localStorage.getItem('sidebar-open');
					document.documentElement.setAttribute(
						'data-sidebar-open',
						sidebar === 'false' ? 'false' : 'true'
					);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
